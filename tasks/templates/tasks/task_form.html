<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if object %}Edit Task{% else %}New Task{% endif %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        .navbar {
            background: #1a1a2e;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
        }

        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .form-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .form-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
        }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.4rem;
            font-size: 0.875rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
            outline: none;
            font-family: inherit;
        }

        .form-control:focus { border-color: #4f46e5; }

        .errorlist {
            list-style: none;
            color: #dc3545;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn-primary {
            padding: 0.75rem 1.5rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #4338ca; }

        .btn-secondary {
            padding: 0.75rem 1.5rem;
            background: #f7fafc;
            color: #4a5568;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-secondary:hover { background: #edf2f7; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="{% url 'tasks:task_list' %}" class="navbar-brand">📝 Task Manager</a>
</nav>

<div class="container">
    <div class="form-card">

        <h2 class="form-title">
            {% if object %}✏️ Edit Task{% else %}➕ New Task{% endif %}
        </h2>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <ul class="errorlist">
                            {% for error in field.errors %}
                                <li>{{ error }}</li>
                            {% endfor %}
                        </ul>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    {% if object %}Save Changes{% else %}Create Task{% endif %}
                </button>
                <a href="{% url 'tasks:task_list' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>

    </div>
</div>
</body>
</html>
